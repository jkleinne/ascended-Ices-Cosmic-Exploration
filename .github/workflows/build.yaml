name: Build

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  Build:
    runs-on: windows-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud Latest
        run: |
          $downloadAttempts = 3
          for ($attempt = 1; $attempt -le $downloadAttempts; $attempt++) {
            try {
              Invoke-WebRequest -Uri https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile latest.zip
              break
            } catch {
              if ($attempt -eq $downloadAttempts) {
                throw "Downloading Dalamud latest.zip failed after $downloadAttempts attempts: $($_.Exception.Message)"
              }
              Start-Sleep -Seconds (5 * $attempt)
            }
          }
          Expand-Archive -Force latest.zip -DestinationPath "$env:AppData\XIVLauncher\addon\Hooks\dev"

      - name: Restore NuGet Packages
        run: dotnet restore ICE/ICE.csproj

      - name: Build Plugin
        run: dotnet build --no-restore -c Release ICE/ICE.csproj
